<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>외부 AI 서비스 PoC 대상자 조회</title>
  <style>
    :root {
      --bg-1: #f4efe6;
      --bg-2: #dbe7f1;
      --card: rgba(255, 252, 247, 0.92);
      --line: rgba(16, 24, 40, 0.1);
      --text: #132238;
      --muted: #526071;
      --accent: #0c6b58;
      --accent-2: #d16b3d;
      --danger: #b42318;
      --shadow: 0 24px 60px rgba(19, 34, 56, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Pretendard Variable", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.8), transparent 35%),
        radial-gradient(circle at bottom right, rgba(209, 107, 61, 0.18), transparent 30%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
      padding: 24px;
      display: grid;
      place-items: center;
    }

    .shell {
      width: min(100%, 760px);
      position: relative;
    }

    .shell::before,
    .shell::after {
      content: "";
      position: absolute;
      inset: auto;
      border-radius: 999px;
      filter: blur(18px);
      z-index: 0;
    }

    .shell::before {
      width: 180px;
      height: 180px;
      background: rgba(12, 107, 88, 0.18);
      top: -40px;
      right: 40px;
    }

    .shell::after {
      width: 140px;
      height: 140px;
      background: rgba(209, 107, 61, 0.18);
      bottom: -30px;
      left: 20px;
    }

    .card {
      position: relative;
      z-index: 1;
      backdrop-filter: blur(14px);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .hero {
      padding: 32px 32px 20px;
      border-bottom: 1px solid var(--line);
      background:
        linear-gradient(120deg, rgba(12, 107, 88, 0.08), rgba(209, 107, 61, 0.08)),
        rgba(255, 255, 255, 0.55);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(19, 34, 56, 0.06);
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    h1 {
      margin: 16px 0 10px;
      font-size: clamp(28px, 5vw, 42px);
      line-height: 1.05;
      letter-spacing: -0.04em;
    }

    .intro {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.7;
    }

    .content {
      padding: 28px 32px 32px;
    }

    form {
      display: grid;
      gap: 14px;
    }

    label {
      font-size: 14px;
      font-weight: 700;
    }

    .input-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
    }

    input {
      width: 100%;
      padding: 16px 18px;
      border-radius: 16px;
      border: 1px solid rgba(19, 34, 56, 0.14);
      font-size: 16px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.88);
      outline: none;
      transition: border-color 160ms ease, box-shadow 160ms ease, transform 160ms ease;
    }

    input:focus {
      border-color: rgba(12, 107, 88, 0.62);
      box-shadow: 0 0 0 4px rgba(12, 107, 88, 0.12);
      transform: translateY(-1px);
    }

    button {
      border: 0;
      padding: 0 22px;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--accent), #0b7e66);
      color: #fff;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 160ms ease, box-shadow 160ms ease, opacity 160ms ease;
      box-shadow: 0 14px 28px rgba(12, 107, 88, 0.22);
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.7;
      cursor: wait;
    }

    .hint {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .status {
      min-height: 24px;
      margin: 18px 0 0;
      font-size: 14px;
      font-weight: 700;
    }

    .status.error {
      color: var(--danger);
    }

    .status.ok {
      color: var(--accent);
    }

    .result {
      margin-top: 22px;
      display: none;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.75);
      overflow: hidden;
    }

    .result.visible {
      display: block;
      animation: reveal 240ms ease;
    }

    .result-head {
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
      background: rgba(19, 34, 56, 0.04);
    }

    .result-head strong {
      display: block;
      font-size: 18px;
    }

    .result-head span {
      color: var(--muted);
      font-size: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .cell {
      padding: 16px 18px;
      border-right: 1px solid var(--line);
    }

    .cell:last-child {
      border-right: 0;
    }

    .cell-label {
      display: block;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .cell-value {
      font-size: 18px;
      font-weight: 800;
      word-break: break-word;
    }

    .cell-value.badge {
      display: inline-flex;
      align-items: center;
      min-height: 40px;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid transparent;
    }

    .cell-value.is-registered {
      color: #0f5132;
      background: #dcfce7;
      border-color: #86efac;
    }

    .cell-value.is-missing {
      color: #9f1239;
      background: #ffe4e6;
      border-color: #fda4af;
    }

    .cell-value.is-pending {
      color: #92400e;
      background: #ffedd5;
      border-color: #fdba74;
    }

    .cell-value.is-complete {
      color: #1d4ed8;
      background: #dbeafe;
      border-color: #93c5fd;
    }

    @keyframes reveal {
      from {
        opacity: 0;
        transform: translateY(6px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 640px) {
      body {
        padding: 16px;
      }

      .hero,
      .content {
        padding-left: 20px;
        padding-right: 20px;
      }

      .input-row,
      .grid {
        grid-template-columns: 1fr;
      }

      .cell {
        min-height: auto;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .cell:last-child {
        border-bottom: 0;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="card">
      <header class="hero">
        <div class="eyebrow">ID Lookup Only</div>
        <h1>외부 AI 서비스 PoC 대상자 조회</h1>
        <p class="intro">본인 Knox ID로 대상자 여부 및 신청 상태를 조회해보세요.</p>
      </header>
      <div class="content">
        <form id="lookup-form">
          <label for="employee-id">아이디</label>
          <div class="input-row">
            <input
              id="employee-id"
              name="employee-id"
              type="text"
              autocomplete="username"
              placeholder="사내 아이디를 입력하세요"
              required
            />
            <button id="submit-button" type="submit">조회</button>
          </div>
          <p class="hint">아이디가 일치할 때만 대상자 여부와 신청 상태가 표시됩니다.</p>
        </form>

        <p id="status" class="status" aria-live="polite"></p>

        <section id="result" class="result" aria-live="polite">
          <div class="result-head">
            <strong>조회 결과</strong>
            <span id="result-subtitle"></span>
          </div>
          <div id="result-grid" class="grid"></div>
        </section>
      </div>
    </section>
  </main>

  <script>
    const LOOKUP_CONFIG = {
      iterations: 30000,
      dataUrl: "lookup-data.json",
      records: null,
      loadPromise: null
    };

    const form = document.getElementById("lookup-form");
    const input = document.getElementById("employee-id");
    const button = document.getElementById("submit-button");
    const statusNode = document.getElementById("status");
    const resultNode = document.getElementById("result");
    const resultGrid = document.getElementById("result-grid");
    const resultSubtitle = document.getElementById("result-subtitle");

    async function loadRecords() {
      if (LOOKUP_CONFIG.records) {
        return LOOKUP_CONFIG.records;
      }

      if (!LOOKUP_CONFIG.loadPromise) {
        LOOKUP_CONFIG.loadPromise = fetch(LOOKUP_CONFIG.dataUrl, {
          cache: "no-cache"
        })
          .then((response) => {
            if (!response.ok) {
              throw new Error("조회 데이터를 불러오지 못했습니다.");
            }
            return response.json();
          })
          .then((records) => {
            LOOKUP_CONFIG.records = records;
            return records;
          })
          .catch((error) => {
            LOOKUP_CONFIG.loadPromise = null;
            throw error;
          });
      }

      return LOOKUP_CONFIG.loadPromise;
    }

    function normalizeId(value) {
      return value.trim().toLowerCase();
    }

    function b64ToBytes(value) {
      const binary = atob(value);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i += 1) {
        bytes[i] = binary.charCodeAt(i);
      }
      return bytes;
    }

    function bytesToBase64Url(buffer) {
      const bytes = new Uint8Array(buffer);
      let binary = "";
      for (const byte of bytes) {
        binary += String.fromCharCode(byte);
      }
      return btoa(binary).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/g, "");
    }

    async function lookupToken(text) {
      const encoded = new TextEncoder().encode(text);
      const digest = await crypto.subtle.digest("SHA-256", encoded);
      return bytesToBase64Url(digest.slice(0, 16));
    }

    async function deriveKey(normalizedId, saltBytes) {
      const baseKey = await crypto.subtle.importKey(
        "raw",
        new TextEncoder().encode(normalizedId),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        {
          name: "PBKDF2",
          salt: saltBytes,
          iterations: LOOKUP_CONFIG.iterations,
          hash: "SHA-256"
        },
        baseKey,
        {
          name: "AES-GCM",
          length: 256
        },
        false,
        ["decrypt"]
      );
    }

    function renderResult(payload) {
      const entries = [
        {
          label: "보안서약서",
          value: payload.a ? "등록" : "미등록",
          tone: payload.a ? "registered" : "missing"
        },
        {
          label: "IP 정보",
          value: payload.i || "미등록",
          tone: payload.i ? "registered" : "missing"
        }
      ];

      if (payload.a && payload.i) {
        entries.push({
          label: "방화벽 신청 상태",
          value: payload.f ? `신청 완료 (${payload.f})` : "미신청",
          tone: payload.f ? "complete" : "pending"
        });
      }

      resultGrid.replaceChildren();
      for (const entry of entries) {
        const cell = document.createElement("div");
        cell.className = "cell";

        const labelNode = document.createElement("span");
        labelNode.className = "cell-label";
        labelNode.textContent = entry.label;

        const valueNode = document.createElement("div");
        valueNode.className = "cell-value";
        valueNode.textContent = entry.value === "" ? "-" : String(entry.value);
        if (entry.tone) {
          valueNode.classList.add("badge", `is-${entry.tone}`);
        }

        cell.append(labelNode, valueNode);
        resultGrid.appendChild(cell);
      }

      resultSubtitle.textContent = "입력한 아이디와 일치하는 정보입니다.";
      resultNode.classList.add("visible");
    }

    function setStatus(message, type) {
      statusNode.textContent = message;
      statusNode.className = `status${type ? ` ${type}` : ""}`;
    }

    function clearResult() {
      resultGrid.replaceChildren();
      resultNode.classList.remove("visible");
      resultSubtitle.textContent = "";
    }

    async function findRecordById(rawId) {
      const normalizedId = normalizeId(rawId);
      if (!normalizedId) {
        throw new Error("아이디를 입력해 주세요.");
      }

      const lookupKey = await lookupToken(`lookup:${normalizedId}`);
      const records = await loadRecords();
      const record = records[lookupKey];
      if (!record) {
        throw new Error("일치하는 신청 정보가 없습니다.");
      }

      const key = await deriveKey(normalizedId, b64ToBytes(record[0]));
      try {
        const plaintextBuffer = await crypto.subtle.decrypt(
          {
            name: "AES-GCM",
            iv: b64ToBytes(record[1])
          },
          key,
          b64ToBytes(record[2])
        );
        const text = new TextDecoder().decode(plaintextBuffer);
        return JSON.parse(text);
      } catch (error) {
        throw new Error("아이디가 올바르지 않거나 복호화에 실패했습니다.");
      }
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      clearResult();
      setStatus("조회 데이터를 준비하고 있습니다...", "");
      button.disabled = true;

      try {
        const payload = await findRecordById(input.value);
        renderResult(payload);
        setStatus("조회가 완료되었습니다.", "ok");
      } catch (error) {
        setStatus(error.message, "error");
      } finally {
        button.disabled = false;
      }
    });
  </script>
</body>
</html>
